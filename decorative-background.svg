<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1400" viewBox="0 0 1200 1400" xmlns="http://www.w3.org/2000/svg" aria-label="Decorative background with bees and flowers">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      .bee-float { animation: float 4s ease-in-out infinite; }
      .flower-float { animation: float 5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Small bee sticker 1 - top left -->
  <g transform="translate(80, 120)" class="bee-float">
    <circle cx="0" cy="0" r="24" fill="#f7c948"/>
    <rect x="-18" y="-8" width="36" height="16" fill="#111827"/>
    <circle cx="-12" cy="-16" r="6" fill="#111827"/>
    <circle cx="12" cy="-16" r="6" fill="#111827"/>
    <circle cx="-12" cy="-16" r="2" fill="#fff"/>
    <circle cx="12" cy="-16" r="2" fill="#fff"/>
    <path d="M-20 0 Q-32 -8, -28 -20" stroke="#111827" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M20 0 Q32 -8, 28 -20" stroke="#111827" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Small bee sticker 2 - top right -->
  <g transform="translate(1100, 180) scale(-1, 1)" class="bee-float" style="animation-delay: 1s;">
    <circle cx="0" cy="0" r="24" fill="#f7c948"/>
    <rect x="-18" y="-8" width="36" height="16" fill="#111827"/>
    <circle cx="-12" cy="-16" r="6" fill="#111827"/>
    <circle cx="12" cy="-16" r="6" fill="#111827"/>
    <circle cx="-12" cy="-16" r="2" fill="#fff"/>
    <circle cx="12" cy="-16" r="2" fill="#fff"/>
    <path d="M-20 0 Q-32 -8, -28 -20" stroke="#111827" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M20 0 Q32 -8, 28 -20" stroke="#111827" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flower 1 - top -->
  <g transform="translate(300, 90)" class="flower-float">
    <g transform="rotate(0)"><circle cx="0" cy="-24" r="14" fill="#ec4899"/></g>
    <g transform="rotate(60)"><circle cx="0" cy="-24" r="14" fill="#f472b6"/></g>
    <g transform="rotate(120)"><circle cx="0" cy="-24" r="14" fill="#ec4899"/></g>
    <g transform="rotate(180)"><circle cx="0" cy="-24" r="14" fill="#f472b6"/></g>
    <g transform="rotate(240)"><circle cx="0" cy="-24" r="14" fill="#ec4899"/></g>
    <g transform="rotate(300)"><circle cx="0" cy="-24" r="14" fill="#f472b6"/></g>
    <circle cx="0" cy="0" r="12" fill="#fbbf24"/>
  </g>

  <!-- Flower 2 - middle right -->
  <g transform="translate(980, 350)" class="flower-float" style="animation-delay: 0.8s;">
    <g transform="rotate(0)"><circle cx="0" cy="-20" r="12" fill="#a78bfa"/></g>
    <g transform="rotate(60)"><circle cx="0" cy="-20" r="12" fill="#c4b5fd"/></g>
    <g transform="rotate(120)"><circle cx="0" cy="-20" r="12" fill="#a78bfa"/></g>
    <g transform="rotate(180)"><circle cx="0" cy="-20" r="12" fill="#c4b5fd"/></g>
    <g transform="rotate(240)"><circle cx="0" cy="-20" r="12" fill="#a78bfa"/></g>
    <g transform="rotate(300)"><circle cx="0" cy="-20" r="12" fill="#c4b5fd"/></g>
    <circle cx="0" cy="0" r="10" fill="#fbbf24"/>
  </g>

  <!-- Small bee sticker 3 - middle left -->
  <g transform="translate(140, 450)" class="bee-float" style="animation-delay: 1.5s;">
    <circle cx="0" cy="0" r="20" fill="#f7c948"/>
    <rect x="-15" y="-7" width="30" height="14" fill="#111827"/>
    <circle cx="-10" cy="-14" r="5" fill="#111827"/>
    <circle cx="10" cy="-14" r="5" fill="#111827"/>
    <circle cx="-10" cy="-14" r="2" fill="#fff"/>
    <circle cx="10" cy="-14" r="2" fill="#fff"/>
    <path d="M-18 0 Q-28 -6, -24 -16" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M18 0 Q28 -6, 24 -16" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flower 3 - center -->
  <g transform="translate(600, 500)" class="flower-float" style="animation-delay: 0.3s;">
    <g transform="rotate(0)"><circle cx="0" cy="-22" r="13" fill="#fbbf24"/></g>
    <g transform="rotate(60)"><circle cx="0" cy="-22" r="13" fill="#fcd34d"/></g>
    <g transform="rotate(120)"><circle cx="0" cy="-22" r="13" fill="#fbbf24"/></g>
    <g transform="rotate(180)"><circle cx="0" cy="-22" r="13" fill="#fcd34d"/></g>
    <g transform="rotate(240)"><circle cx="0" cy="-22" r="13" fill="#fbbf24"/></g>
    <g transform="rotate(300)"><circle cx="0" cy="-22" r="13" fill="#fcd34d"/></g>
    <circle cx="0" cy="0" r="11" fill="#ec4899"/>
  </g>

  <!-- Small bee sticker 4 - right side -->
  <g transform="translate(1050, 700) scale(-1, 1)" class="bee-float" style="animation-delay: 2s;">
    <circle cx="0" cy="0" r="22" fill="#f7c948"/>
    <rect x="-16" y="-7.5" width="32" height="15" fill="#111827"/>
    <circle cx="-11" cy="-15" r="5.5" fill="#111827"/>
    <circle cx="11" cy="-15" r="5.5" fill="#111827"/>
    <circle cx="-11" cy="-15" r="2" fill="#fff"/>
    <circle cx="11" cy="-15" r="2" fill="#fff"/>
    <path d="M-19 0 Q-30 -7, -26 -18" stroke="#111827" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <path d="M19 0 Q30 -7, 26 -18" stroke="#111827" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flower 4 - bottom left -->
  <g transform="translate(200, 800)" class="flower-float" style="animation-delay: 1.2s;">
    <g transform="rotate(0)"><circle cx="0" cy="-19" r="11" fill="#06b6d4"/></g>
    <g transform="rotate(60)"><circle cx="0" cy="-19" r="11" fill="#22d3ee"/></g>
    <g transform="rotate(120)"><circle cx="0" cy="-19" r="11" fill="#06b6d4"/></g>
    <g transform="rotate(180)"><circle cx="0" cy="-19" r="11" fill="#22d3ee"/></g>
    <g transform="rotate(240)"><circle cx="0" cy="-19" r="11" fill="#06b6d4"/></g>
    <g transform="rotate(300)"><circle cx="0" cy="-19" r="11" fill="#22d3ee"/></g>
    <circle cx="0" cy="0" r="9" fill="#fbbf24"/>
  </g>

  <!-- Small bee sticker 5 - bottom right -->
  <g transform="translate(900, 950)" class="bee-float" style="animation-delay: 2.5s;">
    <circle cx="0" cy="0" r="23" fill="#f7c948"/>
    <rect x="-17" y="-8" width="34" height="16" fill="#111827"/>
    <circle cx="-11" cy="-15" r="6" fill="#111827"/>
    <circle cx="11" cy="-15" r="6" fill="#111827"/>
    <circle cx="-11" cy="-15" r="2" fill="#fff"/>
    <circle cx="11" cy="-15" r="2" fill="#fff"/>
    <path d="M-20 0 Q-31 -8, -27 -19" stroke="#111827" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M20 0 Q31 -8, 27 -19" stroke="#111827" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flower 5 - lower middle -->
  <g transform="translate(700, 900)" class="flower-float" style="animation-delay: 1.8s;">
    <g transform="rotate(0)"><circle cx="0" cy="-21" r="12" fill="#10b981"/></g>
    <g transform="rotate(60)"><circle cx="0" cy="-21" r="12" fill="#34d399"/></g>
    <g transform="rotate(120)"><circle cx="0" cy="-21" r="12" fill="#10b981"/></g>
    <g transform="rotate(180)"><circle cx="0" cy="-21" r="12" fill="#34d399"/></g>
    <g transform="rotate(240)"><circle cx="0" cy="-21" r="12" fill="#10b981"/></g>
    <g transform="rotate(300)"><circle cx="0" cy="-21" r="12" fill="#34d399"/></g>
    <circle cx="0" cy="0" r="10" fill="#fbbf24"/>
  </g>

  <!-- Small bee sticker 6 - top middle-left -->
  <g transform="translate(420, 200) scale(-1, 1)" class="bee-float" style="animation-delay: 0.5s;">
    <circle cx="0" cy="0" r="21" fill="#f7c948"/>
    <rect x="-16" y="-7.5" width="32" height="15" fill="#111827"/>
    <circle cx="-11" cy="-15" r="5.5" fill="#111827"/>
    <circle cx="11" cy="-15" r="5.5" fill="#111827"/>
    <circle cx="-11" cy="-15" r="2" fill="#fff"/>
    <circle cx="11" cy="-15" r="2" fill="#fff"/>
    <path d="M-19 0 Q-30 -7, -26 -18" stroke="#111827" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <path d="M19 0 Q30 -7, 26 -18" stroke="#111827" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flower 6 - left side middle -->
  <g transform="translate(90, 600)" class="flower-float" style="animation-delay: 2.2s;">
    <g transform="rotate(0)"><circle cx="0" cy="-18" r="10" fill="#f97316"/></g>
    <g transform="rotate(60)"><circle cx="0" cy="-18" r="10" fill="#fb923c"/></g>
    <g transform="rotate(120)"><circle cx="0" cy="-18" r="10" fill="#f97316"/></g>
    <g transform="rotate(180)"><circle cx="0" cy="-18" r="10" fill="#fb923c"/></g>
    <g transform="rotate(240)"><circle cx="0" cy="-18" r="10" fill="#f97316"/></g>
    <g transform="rotate(300)"><circle cx="0" cy="-18" r="10" fill="#fb923c"/></g>
    <circle cx="0" cy="0" r="8" fill="#fbbf24"/>
  </g>

  <!-- Flower 7 - bottom middle -->
  <g transform="translate(550, 1100)" class="flower-float" style="animation-delay: 0.7s;">
    <g transform="rotate(0)"><circle cx="0" cy="-20" r="12" fill="#d946ef"/></g>
    <g transform="rotate(60)"><circle cx="0" cy="-20" r="12" fill="#e879f9"/></g>
    <g transform="rotate(120)"><circle cx="0" cy="-20" r="12" fill="#d946ef"/></g>
    <g transform="rotate(180)"><circle cx="0" cy="-20" r="12" fill="#e879f9"/></g>
    <g transform="rotate(240)"><circle cx="0" cy="-20" r="12" fill="#d946ef"/></g>
    <g transform="rotate(300)"><circle cx="0" cy="-20" r="12" fill="#e879f9"/></g>
    <circle cx="0" cy="0" r="10" fill="#fbbf24"/>
  </g>
</svg>
